version: '3.9'

networks:
  siger-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:

services:
  # ──────────────────────────────────────────────
  # NGINX — API Gateway
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: siger-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - service-nestjs
    networks:
      - siger-network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # SERVICE A — NestJS (Core, Scraper, Gateway)
  # ──────────────────────────────────────────────
  service-nestjs:
    build:
      context: .
      dockerfile: ./be/service-web-scraper/Dockerfile
    container_name: siger-nestjs
    env_file:
      - ./be/service-web-scraper/.env
    environment:
      - NODE_ENV=production
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
      - service-fastapi
      - meilisearch
    networks:
      - siger-network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # SERVICE B — FastAPI (NLP Processor via gRPC)
  # ──────────────────────────────────────────────
  service-fastapi:
    build:
      context: .
      dockerfile: ./be/service-nlp/Dockerfile
    container_name: siger-fastapi
    env_file:
      - ./be/service-nlp/.env
    ports:
      - '50051:50051'  # gRPC port (internal only, tidak diexpose ke publik via Nginx)
    networks:
      - siger-network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # POSTGRESQL — Database Utama
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: siger-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siger_pangan}
      POSTGRES_USER: ${POSTGRES_USER:-siger_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siger_secret}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - siger-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-siger_user} -d ${POSTGRES_DB:-siger_pangan}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # REDIS — Cache & Session & BullMQ Queue
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: siger-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-siger_redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - siger-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-siger_redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MEILISEARCH — Full-text Search Engine
  # ──────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: siger-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-siger_meili_master_key}
      MEILI_ENV: production
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - siger-network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # PROMETHEUS — Metrics Collector
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: siger-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - siger-network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # GRAFANA — Monitoring Dashboard
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: siger-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-siger_grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - siger-network
    restart: unless-stopped
