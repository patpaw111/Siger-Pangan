# ============================================================
# docker-compose.dev.yml — Siger Pangan (Development)
# ============================================================
# Cara pakai:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml up         (tanpa rebuild)
#   docker compose -f docker-compose.dev.yml down -v    (hapus volume juga)
# ============================================================

name: siger-pangan-dev

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: siger-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: siger_user
      POSTGRES_PASSWORD: siger_dev_password
      POSTGRES_DB: siger_pangan_dev
    ports:
      - "5432:5432"           # Expose agar bisa diakses dari DBeaver/TablePlus
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siger_user -d siger_pangan_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: siger-redis-dev
    restart: unless-stopped
    command: redis-server --loglevel warning
    ports:
      - "6379:6379"           # Expose agar bisa diakses dari RedisInsight
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NestJS: Service Web Scraper ───────────────────────────
  service-web-scraper:
    build:
      context: ./be/service-web-scraper
      dockerfile: Dockerfile
      target: development           # Pakai stage 'development' (hot-reload)
    container_name: siger-web-scraper-dev
    restart: unless-stopped
    env_file:
      - ./be/service-web-scraper/.env
    ports:
      - "3000:3000"
    volumes:
      # Mount source code → perubahan kode langsung hot-reload
      - ./be/service-web-scraper/src:/app/src
      # Jangan mount node_modules (gunakan yang di dalam container)
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_dev_data:
    name: siger-postgres-dev-data
  redis_dev_data:
    name: siger-redis-dev-data
