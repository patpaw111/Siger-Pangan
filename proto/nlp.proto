syntax = "proto3";

package nlp;

// ============================================================
// NLP Service — gRPC Contract
// Single source of truth untuk komunikasi NestJS ↔ FastAPI
//
// Generate TypeScript bindings di NestJS:
//   (otomatis oleh @nestjs/microservices + proto-loader)
//
// Generate Python bindings di FastAPI:
//   python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. nlp.proto
// ============================================================

service NlpService {
  // Analisis satu pesan dari user chatbot
  rpc AnalyzeMessage (NlpRequest) returns (NlpResponse);

  // Health check untuk monitoring
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

// ──────────────────────────────────────────────
// Request & Response Messages
// ──────────────────────────────────────────────

message NlpRequest {
  string session_id    = 1;  // ID sesi chat untuk tracking konteks
  string text          = 2;  // Teks mentah dari user
  string language      = 3;  // Kode bahasa, default: "id" (Bahasa Indonesia)
}

message NlpResponse {
  string intent          = 1;  // Intent yang terdeteksi
  float  confidence      = 2;  // Skor kepercayaan (0.0 - 1.0)
  string commodity       = 3;  // Nama komoditas pangan yang disebut
  string kabupaten       = 4;  // Nama kabupaten/kota yang disebut
  string time_expression = 5;  // Ekspresi waktu: "hari ini", "minggu lalu"
  repeated string raw_entities = 6;  // Semua entity mentah yang diekstrak
  bool   success         = 7;  // Status pemrosesan
  string error_message   = 8;  // Pesan error jika success = false
}

// ──────────────────────────────────────────────
// Intent yang Dikenali
// ──────────────────────────────────────────────
//
// "query_price"    → "berapa harga beras di Bandar Lampung?"
// "compare_price"  → "bandingkan harga cabai di Pringsewu dan Pesawaran"
// "price_trend"    → "harga beras minggu ini naik atau turun?"
// "list_commodity" → "komoditas apa saja yang dipantau?"
// "list_region"    → "kabupaten mana saja yang tercakup?"
// "greet"          → "halo", "selamat pagi"
// "help"           → "bisa bantu apa?", "cara pakai"
// "unknown"        → tidak dikenali
// ──────────────────────────────────────────────

// ──────────────────────────────────────────────
// Health Check
// ──────────────────────────────────────────────

message HealthCheckRequest {}

message HealthCheckResponse {
  bool   is_healthy    = 1;
  string model_version = 2;
  string status        = 3;
}
