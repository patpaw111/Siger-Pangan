global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'siger-pangan'
    environment: 'production'

rule_files:
  - 'rules/*.yml'

scrape_configs:
  # ── NestJS Service Metrics ──
  - job_name: 'siger-nestjs'
    static_configs:
      - targets: ['service-nestjs:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── FastAPI NLP Service Metrics ──
  - job_name: 'siger-fastapi'
    static_configs:
      - targets: ['service-fastapi:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── PostgreSQL Metrics (via postgres_exporter) ──
  # - job_name: 'siger-postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ── Redis Metrics (via redis_exporter) ──
  # - job_name: 'siger-redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ── Prometheus Self-monitoring ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
