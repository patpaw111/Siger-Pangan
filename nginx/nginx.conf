events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────
    # Logging Format
    # ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ──────────────────────────────────────────────
    # Optimasi Performa
    # ──────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # ──────────────────────────────────────────────
    # Rate Limiting (Anti-spam & Anti-DDoS)
    # ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=5r/s;

    # ──────────────────────────────────────────────
    # Upstreams untuk Microservices
    # ──────────────────────────────────────────────
    upstream auth_backend {
        server service-auth:3000;
        keepalive 32;
    }

    upstream catalog_backend {
        server service-catalog:3000;
        keepalive 32;
    }

    upstream scraper_backend {
        server service-web-scraper:3000;
        keepalive 32;
    }

    # ──────────────────────────────────────────────
    # Main Server Block
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Service Auth ──
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://auth_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Service Catalog ──
        location /api/v1/catalog/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://catalog_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Service Web Scraper ──
        location /api/v1/scraper/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://scraper_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Default Router (Scraper by default if empty) ──
        location / {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://scraper_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Chatbot Endpoint (rate limit lebih ketat) ──
        location /api/v1/chatbot/ {
            limit_req zone=chatbot_limit burst=10 nodelay;
            proxy_pass         http://scraper_backend; # Asumsikan scraper jadi proxy chatbot sementara
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health Check (tidak kena rate limit) ──
        location /health {
            proxy_pass http://scraper_backend/health;
            access_log off;
        }

        # Blokir akses langsung ke service internal
        location /metrics {
            deny all;
            return 403;
        }
    }
}
