events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────
    # Logging Format
    # ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ──────────────────────────────────────────────
    # Optimasi Performa
    # ──────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # ──────────────────────────────────────────────
    # Rate Limiting (Anti-spam & Anti-DDoS)
    # ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=5r/s;

    # ──────────────────────────────────────────────
    # Upstream: NestJS Service
    # ──────────────────────────────────────────────
    upstream nestjs_backend {
        server service-nestjs:3000;
        # Untuk horizontal scaling, tambahkan server di sini:
        # server service-nestjs-2:3000;
        keepalive 32;
    }

    # ──────────────────────────────────────────────
    # Main Server Block
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API Endpoint (NestJS) ──
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass         http://nestjs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── Chatbot Endpoint (rate limit lebih ketat) ──
        location /api/v1/chatbot/ {
            limit_req zone=chatbot_limit burst=10 nodelay;

            proxy_pass         http://nestjs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket untuk real-time update (opsional) ──
        location /ws/ {
            proxy_pass         http://nestjs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Health Check (tidak kena rate limit) ──
        location /health {
            proxy_pass http://nestjs_backend/health;
            access_log off;
        }

        # Blokir akses langsung ke service internal
        location /metrics {
            deny all;
            return 403;
        }
    }
}
